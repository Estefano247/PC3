<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallCenter WebPhone</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>CallCenter WebPhone</h1>
            <p>Central Telefónica Unificada</p>
        </div>

        <div class="status-bar">
            <div class="status-indicator">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Desconectado</span>
            </div>
            <div>
                Ext: <span id="extension-display">---</span>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="phone" id="tabPhone">Teléfono</button>
            <button class="tab" data-tab="recordings" id="tabRecordings">Grabaciones</button>
        </div>

        <!-- Web Login Form -->
        <div class="login-form" id="webLoginForm">
            <h3>Inicio de sesión</h3>
            <form id="webLoginFormTag">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="webUsername" placeholder="Usuario" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="webPassword" placeholder="Contraseña" autocomplete="current-password">
                </div>
                <button class="btn btn-primary" id="webLoginBtn" type="button">Iniciar sesión</button>
                <div id="webLoginError" class="error-message hidden"></div>
            </form>
        </div>

        <!-- SIP Registration (auto after login, shown only on error) -->
        <div class="login-form hidden" id="sipLoginForm">
            <h3>Registro SIP manual</h3>
            <form id="sipLoginFormTag">
                <div class="form-group">
                    <label>Extensión SIP</label>
                    <input type="text" id="extension" placeholder="1001" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Contraseña SIP</label>
                    <input type="password" id="sipPassword" placeholder="Contraseña SIP" autocomplete="current-password">
                </div>
                <button class="btn btn-primary" id="sipLoginBtn" type="button">Reintentar registro SIP</button>
                <button class="btn btn-secondary" id="sipSkipBtn" style="margin-top:8px;" type="button">Saltar registro SIP</button>
            </form>
        </div>

        <!-- Phone Tab -->
        <div class="tab-content active" id="phoneTab">
            <div class="call-section hidden" id="callSection">
                <div class="dialpad" id="dialpad">
                    <button class="dial-btn" data-value="1">1</button>
                    <button class="dial-btn" data-value="2">2</button>
                    <button class="dial-btn" data-value="3">3</button>
                    <button class="dial-btn" data-value="4">4</button>
                    <button class="dial-btn" data-value="5">5</button>
                    <button class="dial-btn" data-value="6">6</button>
                    <button class="dial-btn" data-value="7">7</button>
                    <button class="dial-btn" data-value="8">8</button>
                    <button class="dial-btn" data-value="9">9</button>
                    <button class="dial-btn" data-value="*">*</button>
                    <button class="dial-btn" data-value="0">0</button>
                    <button class="dial-btn" data-value="#">#</button>
                </div>

                <div class="call-input">
                    <input type="text" id="targetExtension" placeholder="Extensión destino" maxlength="4">
                </div>

                <div class="call-controls-row" id="callControls">
                    <button class="btn btn-icon" id="muteBtn" title="Silenciar">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                        <span>Silenciar</span>
                    </button>
                    <button class="btn btn-icon" id="holdBtn" title="Retener">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        <span>Retener</span>
                    </button>

                </div>

                <div class="call-actions">
                    <button class="btn btn-success" id="callBtn">Llamar</button>
                    <button class="btn btn-danger hidden" id="hangupBtn">Colgar</button>
                    <button class="btn btn-danger" id="logoutBtn">Salir</button>
                </div>

                <div class="audio-controls">
                    <audio id="remoteAudio" autoplay></audio>
                </div>
            </div>

            <div class="call-log">
                <h3>Registro de llamadas</h3>
                <div class="log-entries" id="logEntries">
                    <div class="log-entry" style="color: #64748b;">
                        <span>Inicia sesión para ver llamadas</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recordings Tab -->
        <div class="tab-content" id="recordingsTab">
            <div class="recordings-header">
                <h3>Grabaciones de llamadas</h3>
                <button class="btn btn-primary" id="refreshRecordings" style="width:auto; padding:6px 16px; font-size:12px;">Actualizar</button>
            </div>
            <div class="recordings-list" id="recordingsList">
                <div class="loading">Cargando grabaciones...</div>
            </div>
        </div>
    </div>

    <!-- Incoming call notification -->
    <div class="incoming-call hidden" id="incomingCall">
        <div class="incoming-call-content">
            <div class="incoming-call-icon">&#x1F4DE;</div>
            <p>Llamada entrante de <strong id="callerName">...</strong></p>
            <div class="incoming-call-actions">
                <button class="btn btn-success" id="answerBtn">Responder</button>
                <button class="btn btn-danger" id="rejectBtn">Rechazar</button>
            </div>
        </div>
    </div>

    <script src="js/sip.js?v=4"></script>
    <script src="js/app.js?v=4"></script>
</body>
</html>
