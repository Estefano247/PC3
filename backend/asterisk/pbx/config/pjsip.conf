[global]
type = global
default_realm = localhost
endpoint_identifier_order = ip,user,anonymous

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

[transport-tcp]
type = transport
protocol = tcp
bind = 0.0.0.0:5060

[transport-tls]
type = transport
protocol = tls
bind = 0.0.0.0:5061
cert_file = /etc/asterisk/keys/asterisk.pem
priv_key_file = /etc/asterisk/keys/asterisk.key
method = tlsv1_2
verify_server = no
verify_client = no

[transport-ws]
type = transport
protocol = ws
bind = 0.0.0.0:8088

[ext-base](!)
type = endpoint
context = callcenter
disallow = all
allow = ulaw
allow = alaw
allow = g729
webrtc = yes
transport = transport-ws
identify_by = username

[auth-base](!)
type = auth
auth_type = userpass

[aor-base](!)
type = aor
max_contacts = 1

[admin-base](ext-base)
context = admins

[3001](admin-base)
auth = 3001-auth
aors = 3001-aor
callerid = "Admin 1" <3001>

[3001-auth](auth-base)
username = 3001
password = sip3001pass

[3001-aor](aor-base)
