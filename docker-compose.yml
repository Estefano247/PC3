services:

  db:
    image: postgres:15
    container_name: callcenter-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-callcenter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CallCenter2024!}
      POSTGRES_DB: ${POSTGRES_DB:-callcenter}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
      - ./db/init-midpoint.sql:/docker-entrypoint-initdb.d/002-midpoint-schema.sql:ro
    networks:
      - callcenter-net
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER:-callcenter} -d ${POSTGRES_DB:-callcenter}
      interval: 10s
      timeout: 5s
      retries: 5

  midpoint:
    build:
      context: ./midpoint
      dockerfile: Dockerfile
    container_name: callcenter-midpoint
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: ["/opt/midpoint/scripts/init-midpoint.sh"]
    environment:
      MP_INIT_DB: "true"
      MP_ADMIN_PASSWORD: ${MP_PASSWORD:-Chang3M3!}
      MP_SET_midpoint_repository_type: native
      MP_SET_midpoint_repository_database: postgresql
      MP_SET_midpoint_repository_jdbcUrl: jdbc:postgresql://db:5432/midpoint
      MP_SET_midpoint_repository_jdbcUsername: ${POSTGRES_USER:-callcenter}
      MP_SET_midpoint_repository_jdbcPassword: ${POSTGRES_PASSWORD:-CallCenter2024!}
      MP_SET_midpoint_repository_missingSchemaAction: create
      MP_SET_midpoint_repository_upgradeableSchemaAction: stop
    volumes:
      - midpoint-data:/opt/midpoint/var
      - ./midpoint/config/config.xml:/opt/midpoint/var/config.xml
    ports:
      - "8080:8080"
    networks:
      - callcenter-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/midpoint"]
      start_period: 120s
      interval: 30s
      timeout: 10s
      retries: 10

  asterisk:
    build:
      context: ./asterisk
      dockerfile: Dockerfile
    container_name: callcenter-asterisk
    restart: unless-stopped
    depends_on:
      midpoint:
        condition: service_healthy
    volumes:
      - asterisk-config:/etc/asterisk
      - ./asterisk/scripts:/opt/asterisk/scripts:ro
      - asterisk-log:/var/log/asterisk
      - asterisk-recordings:/var/spool/asterisk/monitor
    ports:
      - "${ASTERISK_SIP_PORT:-5060}:5060/udp"
      - "${ASTERISK_SIP_PORT:-5060}:5060/tcp"
      - "8088:8088/tcp"
      - "${ASTERISK_RTP_START:-10000}-${ASTERISK_RTP_END:-10100}:${ASTERISK_RTP_START:-10000}-${ASTERISK_RTP_END:-10100}/udp"
    networks:
      - callcenter-net

  minio:
    image: minio/minio:latest
    container_name: callcenter-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
    networks:
      - callcenter-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  recorder:
    build:
      context: ./recorder
      dockerfile: Dockerfile
    container_name: callcenter-recorder
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      asterisk:
        condition: service_started
    volumes:
      - asterisk-recordings:/recordings:ro
    networks:
      - callcenter-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: callcenter-frontend
    restart: unless-stopped
    depends_on:
      asterisk:
        condition: service_started
    ports:
      - "3000:80"
    networks:
      - callcenter-net

networks:
  callcenter-net:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_NETWORK_SUBNET:-172.20.0.0/16}

volumes:
  db-data:
  midpoint-data:
  asterisk-config:
  asterisk-log:
  asterisk-recordings:
  minio-data:
