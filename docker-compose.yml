services:

  db:
    image: postgres:15
    container_name: callcenter-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-callcenter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CallCenter2024!}
      POSTGRES_DB: ${POSTGRES_DB:-callcenter}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./backend/cdr/db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
      - ./backend/cdr/db/init-midpoint.sql:/docker-entrypoint-initdb.d/002-midpoint-schema.sql:ro
    networks:
      - callcenter-net
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER:-callcenter} -d ${POSTGRES_DB:-callcenter}
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: callcenter-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: pgadmin@example.com
      PGADMIN_DEFAULT_PASSWORD: pgadmin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - callcenter-net

  midpoint:
    build:
      context: ./backend/auth/midpoint
      dockerfile: Dockerfile
    container_name: callcenter-midpoint
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      MP_INIT_DB: "true"
      MP_ADMIN_PASSWORD: ${MP_PASSWORD:-Chang3M3!}
      MP_SET_midpoint_repository_type: native
      MP_SET_midpoint_repository_database: postgresql
      MP_SET_midpoint_repository_jdbcUrl: jdbc:postgresql://db:5432/midpoint
      MP_SET_midpoint_repository_jdbcUsername: ${POSTGRES_USER:-callcenter}
      MP_SET_midpoint_repository_jdbcPassword: ${POSTGRES_PASSWORD:-CallCenter2024!}
      MP_SET_midpoint_repository_missingSchemaAction: create
      MP_SET_midpoint_repository_upgradeableSchemaAction: stop
    volumes:
      - midpoint-data:/opt/midpoint/var
      - ./backend/auth/midpoint/config/config.xml:/opt/midpoint/var/config.xml
    ports:
      - "8080:8080"
    networks:
      - callcenter-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/midpoint"]
      start_period: 120s
      interval: 30s
      timeout: 10s
      retries: 10

  asterisk:
    build:
      context: ./backend/asterisk/pbx
      dockerfile: Dockerfile
    container_name: callcenter-asterisk
    hostname: asterisk
    restart: unless-stopped
    depends_on:
      midpoint:
        condition: service_healthy
    volumes:
      - asterisk-config:/etc/asterisk
      - ./backend/asterisk/pbx/scripts:/opt/asterisk/scripts:ro
      - asterisk-log:/var/log/asterisk
      - asterisk-recordings:/var/spool/asterisk/monitor
    ports:
      - "${ASTERISK_SIP_PORT:-5060}:5060/udp"
      - "${ASTERISK_SIP_PORT:-5060}:5060/tcp"
      - "8088:8088/tcp"
      - "${ASTERISK_RTP_START:-10000}-${ASTERISK_RTP_END:-10100}:${ASTERISK_RTP_START:-10000}-${ASTERISK_RTP_END:-10100}/udp"
    networks:
      - callcenter-net

  minio:
    image: minio/minio:latest
    container_name: callcenter-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - callcenter-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  recorder-svc:
    build:
      context: ./backend/recorder
      dockerfile: Dockerfile
    container_name: callcenter-recorder-svc
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      asterisk:
        condition: service_started
    environment:
      NODE_ENV: production
      MINIO_HOST: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: recordings
    volumes:
      - asterisk-recordings:/recordings:ro
    expose:
      - "3005"
    networks:
      - callcenter-net

  auth-svc:
    build:
      context: ./backend/auth
      dockerfile: Dockerfile
    container_name: callcenter-auth
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      midpoint:
        condition: service_started
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: "5432"
      DB_USERNAME: ${POSTGRES_USER:-callcenter}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-CallCenter2024!}
      DB_NAME: ${POSTGRES_DB:-callcenter}
      JWT_SECRET: ${JWT_SECRET:-callcenter-secret-key}
      MIDPOINT_URL: http://midpoint:8080/midpoint
      MP_ADMIN_USER: administrator
      MP_ADMIN_PASSWORD: ${MP_PASSWORD:-Chang3M3!}
      MP_INIT_DIR: /opt/midpoint/init
    volumes:
      - ./backend/auth/midpoint/config:/opt/midpoint/init:ro
    expose:
      - "3002"
    networks:
      - callcenter-net

  cdr-svc:
    build:
      context: ./backend/cdr
      dockerfile: Dockerfile
    container_name: callcenter-cdr
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: "5432"
      DB_USERNAME: ${POSTGRES_USER:-callcenter}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-CallCenter2024!}
      DB_NAME: ${POSTGRES_DB:-callcenter}
    expose:
      - "3003"
    networks:
      - callcenter-net

  asterisk-svc:
    build:
      context: ./backend/asterisk
      dockerfile: Dockerfile
    container_name: callcenter-asterisk-svc
    restart: unless-stopped
    depends_on:
      asterisk:
        condition: service_started
    environment:
      NODE_ENV: production
      ASTERISK_SSH_HOST: asterisk
      ASTERISK_SSH_PORT: "22"
      ASTERISK_SSH_USER: provision
      ASTERISK_SSH_KEY: /ssh/provision-key
    volumes:
      - ./backend/asterisk/pbx/ssh/provision-key:/ssh/provision-key:ro
    expose:
      - "3004"
    networks:
      - callcenter-net

  api-gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    container_name: callcenter-gateway
    restart: unless-stopped
    depends_on:
      auth-svc:
        condition: service_started
      cdr-svc:
        condition: service_started
      asterisk-svc:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      AUTH_HOST: auth-svc
      CDR_HOST: cdr-svc
      ASTERISK_HOST: asterisk-svc
      JWT_SECRET: ${JWT_SECRET:-callcenter-secret-key}
      MINIO_HOST: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: recordings
      MINIO_PUBLIC_ENDPOINT: localhost:9000
    ports:
      - "3001:3001"
    networks:
      - callcenter-net

  frontend:
    build:
      context: ./backend/gateway/frontend
      dockerfile: Dockerfile
    container_name: callcenter-frontend
    restart: unless-stopped
    depends_on:
      asterisk:
        condition: service_started
    ports:
      - "3000:80"
    networks:
      - callcenter-net

  prometheus:
    image: prom/prometheus:latest
    container_name: callcenter-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - callcenter-net

  grafana:
    image: grafana/grafana:latest
    container_name: callcenter-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: grafana
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3006:3000"
    depends_on:
      - prometheus
    networks:
      - callcenter-net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: callcenter-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    networks:
      - callcenter-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: callcenter-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-callcenter}:${POSTGRES_PASSWORD:-CallCenter2024!}@db:5432/callcenter?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - callcenter-net

networks:
  callcenter-net:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_NETWORK_SUBNET:-172.20.0.0/16}

volumes:
  db-data:
  midpoint-data:
  asterisk-config:
  asterisk-log:
  asterisk-recordings:
  minio-data:
  pgadmin-data:
  prometheus-data:
  grafana-data:
